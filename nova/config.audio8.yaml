# Opt-in Audio8 ASR A/B — does not change the SenseVoice default in config.yaml.
# NOVA_CONFIG=nova/config.audio8.yaml uv run python scripts/run_demo.py
#
# Audio8-ASR-0.1B is CC-BY-NC-4.0 (research/demo only).
# Swap back: unset NOVA_CONFIG or use nova/config.yaml (stt: sensevoice).

llm_profile: lfm2.5-350m-f16

stt: audio8
stt_device: cuda
audio8_model: AutoArk-AI/Audio8-ASR-0.1B
audio8_max_new_tokens: 64
audio8_attn_impl: eager
# language tag only; prompt is official HF "Please transcribe this audio."
# (Do not put "English" in audio8_prompt — causes English-English loops.)
audio8_language: en
# Final-only decode. Audio8 has no built-in VAD; Silero owns turn boundaries.
audio8_skip_progressive: true

# Keep SenseVoice keys for easy flip back without editing this file elsewhere.
sensevoice_model: FunAudioLLM/SenseVoiceSmall
sensevoice_language: en

tts: kokoro
tts_device: cuda

ws_host: 127.0.0.1
ws_port: 8766

tool_service_host: 127.0.0.1
tool_service_port: 8000

tools_enabled: all
tool_route_mode: model
router_llm_profile: functiongemma-270m-q4
chat_size: 8

driveauth:
  use_mock: true
  seed_mature: true
  store_dir: runtime/driveauth_store
  driver_id: driver1
