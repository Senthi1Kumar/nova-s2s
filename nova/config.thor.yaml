# Thor / Jetson single-model demo: one GGUF, full toolbox, no 230M sidecar.
#   NOVA_CONFIG=nova/config.thor.yaml uv run python scripts/run_demo.py
#
# Point llm_profile at a profile in nova/launch/models.yaml whose gguf_path
# exists on the board (override paths in models.yaml or symlink under runtime/models/).

llm_profile: gemma-4-e2b-it-q4

stt: sensevoice
stt_device: cuda
sensevoice_model: FunAudioLLM/SenseVoiceSmall
sensevoice_language: en

tts: kokoro
tts_device: cuda

ws_host: 127.0.0.1
ws_port: 8766

tool_service_host: 127.0.0.1
tool_service_port: 8000

tools_enabled: all

# All registered tools + tool_choice=auto. No lexical force, no :8081.
tool_route_mode: full

# Unused when tool_route_mode=full (run_demo skips the router llama-server).
# router_llm_profile: lfm2.5-230m-q4

chat_size: 8

driveauth:
  use_mock: true
  seed_mature: true
  store_dir: runtime/driveauth_store
  driver_id: driver1
